<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} • CampaignOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0c] text-zinc-200">
<div class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-10">
        <div>
            <a href="/" class="text-sm text-zinc-400 hover:text-white">← Back to Dashboard</a>
            <h1 class="text-4xl font-semibold tracking-tight mt-1">My Campaigns</h1>
        </div>
        
        <!-- New Campaign Form -->
        <form action="/campaign/new" method="post" class="flex gap-x-3">
            <input type="text" name="topic" placeholder="New campaign topic..." 
                   class="bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-3 w-80 text-sm focus:outline-none focus:border-zinc-600">
            <button type="submit" 
                    class="bg-white text-black px-6 rounded-2xl font-semibold text-sm hover:bg-zinc-200">
                Create Campaign
            </button>
        </form>
    </div>

    {% if campaigns %}
        <div class="space-y-3">
            {% for campaign in campaigns %}
            <a href="/campaign/{{ campaign.id }}" 
               class="block card p-6 rounded-3xl hover:border-zinc-700 transition-all group">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="font-semibold text-lg group-hover:text-blue-400 transition-colors">
                            {{ campaign.topic }}
                        </div>
                        <div class="text-xs text-zinc-500 mt-1">
                            Created {{ campaign.created_at[:10] }} • Status: {{ campaign.status }}
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs px-4 py-1 rounded-2xl bg-zinc-900 inline-block">
                            #{{ campaign.id }}
                        </div>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>
    {% else %}
        <div class="text-center py-20 text-zinc-400">
            <p>No campaigns yet. Create your first one above.</p>
        </div>
    {% endif %}
</div>
</body>
</html>
